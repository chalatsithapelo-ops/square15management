# Upstream for Node.js cluster
upstream square15_backend {
    least_conn;
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    server_name square15management.co.za www.square15management.co.za;
    client_max_body_size 50m;

    # Serve static assets directly from disk (bypass Node.js)
    # These are content-hashed so cache aggressively.
    location /assets/ {
        alias /root/square15management/.output/public/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve other static public files directly
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|apk)$ {
        root /root/square15management/.output/public;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Service worker and manifest - never cache
    location = /sw.js {
        root /root/square15management/.output/public;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /manifest.webmanifest {
        root /root/square15management/.output/public;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /manifest.json {
        root /root/square15management/.output/public;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # MinIO proxy
    location ^~ /minio/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        # Large photo uploads from mobile clients on LTE can take a while.
        # Defaults of 60s cause spurious "Failed to fetch" errors.
        client_max_body_size 50m;
        client_body_timeout 5m;
        proxy_connect_timeout 30s;
        proxy_send_timeout 5m;
        proxy_read_timeout 5m;
        send_timeout 5m;
    }

    # APK download
    location /square15-app.apk {
        alias /var/www/downloads/square15-app.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment; filename=Square15.apk";
    }

    # Fallback named location for try_files
    location @backend {
        proxy_pass http://square15_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # All other requests to Node.js.
    # Force no-cache on HTML/SSR responses so browsers always revalidate
    # the index page. Otherwise they keep loading stale HTML pointing at
    # hashed asset bundles that were deleted in the latest deploy ->
    # white screen / 404s after every release.
    location / {
        proxy_pass http://square15_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Strip any Cache-Control from upstream and force no-cache so that
        # the HTML / API responses are always revalidated. Hashed static
        # assets are served from the /assets/ block above and remain
        # aggressively cached.
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    listen [::]:443 ssl http2 ipv6only=on;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/square15management.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/square15management.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}

server {
    if ($host = www.square15management.co.za) {
        return 301 https://$host$request_uri;
    }

    if ($host = square15management.co.za) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name square15management.co.za www.square15management.co.za;
    client_max_body_size 50m;
    return 404;
}
